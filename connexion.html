<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion MWANA MBOKA</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(180deg,#009245,#004d26);
    min-height:100vh;
}

.header{
    text-align:center;
    padding-top:30px;
}

.banner{
    width:90%;
    max-width:500px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.card{
    width:90%;
    max-width:420px;
    background:white;
    margin: -30px auto 30px;
    border-radius:30px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    text-align:center;
}

.logo{
    width:100px;
    background:white;
    padding:10px;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

h1{
    color:#009245;
    margin-top:20px;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:25px;
}

.input{
    width:100%;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:15px;
    background:#f3f5f7;
    font-size:16px;
    box-sizing:border-box;
}

.login{
    width:100%;
    margin-top:25px;
    padding:18px;
    border:none;
    border-radius:15px;
    background:#009245;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.member{
    display:block;
    margin-top:15px;
    padding:18px;
    border-radius:15px;
    background:#f1c40f;
    color:black;
    text-decoration:none;
    font-weight:bold;
}

.home{
    display:block;
    margin-top:15px;
    padding:18px;
    border-radius:15px;
    background:#e5e5e5;
    color:black;
    text-decoration:none;
    font-weight:bold;
}

.footer{
    margin-top:25px;
    color:#666;
    font-size:14px;
}

.version{
    margin-top:10px;
    color:#999;
    font-size:12px;
}

</style>

</head>

<body>

<div class="header">

<img src="banniere.png" class="banner">

</div>

<div class="card">

<img src="logo.png" class="logo">

<h1>MWANA MBOKA</h1>

<div class="subtitle">
Espace membre sécurisé
</div>

<input type="text" class="input"
placeholder="🆔 Matricule">

<input type="password" class="input"
placeholder="🔒 Mot de passe">

<button class="login"
onclick="connexion()">

SE CONNECTER

</button>

<a href="adhesion.html" class="member">
🤝 Devenir membre
</a>

<a href="index.html" class="home">
🏠 Retour à l'accueil
</a>

<div class="footer">

Ensemble nous irons plus loin.

<div class="version">
Version 1.0
</div>

</div>

</div>

<script>

function connexion(){

    window.location.href="espace.html";

}

</script>

</body>

</html>
