<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion - MWANA MBOKA</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f5f7;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:450px;
}

.banner{
    width:100%;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    margin-bottom:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    width:90px;
    background:white;
    padding:8px;
    border-radius:15px;
    margin-bottom:15px;
}

h1{
    color:#009245;
    margin:10px 0;
}

p{
    color:#666;
}

input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:#009245;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#007537;
}

.btn-member{
    display:block;
    margin-top:15px;
    padding:14px;
    background:#f1c40f;
    color:#000;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    transition:0.3s;
}

.btn-member:hover{
    background:#ddb10b;
}

.btn-home{
    display:block;
    margin-top:15px;
    padding:14px;
    background:#dddddd;
    color:#000;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    font-size:14px;
    color:#777;
}

</style>

</head>

<body>

<div class="container">

<img src="banniere.png" class="banner">

<div class="card">

<img src="logo.png" class="logo">

<h1>Connexion Membre</h1>

<p>
Bienvenue dans l'espace membre de MWANA MBOKA.
</p>

<input type="text" placeholder="🆔 Matricule">

<input type="password" placeholder="🔒 Mot de passe">

<button onclick="connexion()">
🔐 Se connecter
</button>

<a href="adhesion.html" class="btn-member">
🤝 Devenir membre
</a>

<a href="index.html" class="btn-home">
🏠 Retour à l'accueil
</a>

<div class="footer">
Ensemble nous irons plus loin.
</div>

</div>

</div>

<script>

function connexion(){

    window.location.href = "espace.html";

}

</script>

</body>

</html>
