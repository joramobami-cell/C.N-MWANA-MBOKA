<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - MWANA MBOKA</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #009245;
            color: white;
            text-align: center;
            padding: 50px 20px;
        }

        nav {
            background: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            margin: 10px;
            text-decoration: none;
            color: #009245;
            font-weight: bold;
            font-size: 17px;
        }

        section {
            max-width: 1200px;
            margin: auto;
            padding: 30px 20px;
        }

        h2 {
            text-align: center;
            color: #009245;
            margin-bottom: 30px;
        }

        .galerie {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .photo {
            width: 320px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .photo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .photo p {
            text-align: center;
            padding: 15px;
            font-weight: bold;
            color: #333;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            nav a {
                display: block;
                margin: 10px 0;
            }

            .photo {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Galerie MWANA MBOKA</h1>
        <p>Nos activités et nos actions communautaires</p>
    </header>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="apropos.html">À propos</a>
        <a href="actualites.html">Actualités</a>
        <a href="formation.html">Formation</a>
        <a href="entraide.html">Entraide</a>
        <a href="adhesion.html">Adhésion</a>
        <a href="contact.html">Contact</a>
        <a href="galerie.html">Galerie</a>
    </nav>

    <section>

        <h2>Nos activités</h2>

        <div class="galerie">

            <div class="photo">
                <img src="banniere.png" alt="Bannière MWANA MBOKA">
                <p>Bannière officielle de la communauté</p>
            </div>

            <div class="photo">
                <img src="images/images/mbote.png" alt="Mboté">
                <p>Mboté et bienvenue chez nous</p>
            </div>

        </div>

    </section>

    <footer>
        COMMUNAUTÉ NUMÉRIQUE MWANA MBOKA<br>
        <strong>Ensemble nous irons plus loin.</strong>
    </footer>

</body>

  </html>
