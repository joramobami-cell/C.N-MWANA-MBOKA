<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhésion - MWANA MBOKA</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#009245;
color:white;
text-align:center;
padding:40px;
}

section{
max-width:700px;
margin:30px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input, select{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
background:#009245;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#006837;
}

</style>

</head>

<body>

<header>
<h1>Formulaire d'Adhésion</h1>
<p>Rejoignez la Communauté Numérique MWANA MBOKA</p>
</header>

<section>

<form>

<label>Nom complet</label>
<input type="text" placeholder="Votre nom complet">

<label>Téléphone</label>
<input type="tel" placeholder="Votre numéro">

<label>Profession</label>
<input type="text" placeholder="Votre profession">

<label>Ville</label>
<input type="text" placeholder="Votre ville">

<label>Nom du parrain</label>
<input type="text" placeholder="Nom du parrain">

<button type="submit">
Envoyer la demande
</button>

</form>

</section>

</body>
  </html>
