<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mon Profil | MWANA MBOKA</title>


<link rel="stylesheet" href="profil.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<div class="container">


<header class="header">


<div class="logo-zone">

<img src="logo.png">


<div>

<h1>
MWANA MBOKA
</h1>

<p>
Mon espace personnel
</p>


</div>


</div>



<a href="espace.html" class="back">

<i class="fa-solid fa-arrow-left"></i>

Retour

</a>


</header>





<main class="profil-content">



<section class="profil-card">



<div class="photo-zone">


<img 

id="photoProfil"

src="logo.png"

alt="Photo profil">


<input

type="file"

id="inputPhoto"

accept="image/*"

hidden>



<button id="btnPhoto">

<i class="fa-solid fa-camera"></i>

Changer photo

</button>


</div>






<div class="infos">


<h2 id="nom">

Nom du membre

</h2>



<p>

<i class="fa-solid fa-id-card"></i>

Matricule :

<span id="matricule">

MMB-0000

</span>

</p>




<p>

<i class="fa-solid fa-phone"></i>

Téléphone :

<span id="telephone">

---

</span>

</p>




<p>

<i class="fa-solid fa-user-group"></i>

Parrain :

<span id="parrain">

---

</span>

</p>




<p>

<i class="fa-solid fa-circle-check"></i>

Statut :

<span id="statut">

Actif

</span>

</p>




<p>

<i class="fa-solid fa-calendar"></i>

Adhésion :

<span id="dateAdhesion">

---

</span>

</p>



</div>



</section>







<section class="edit-card">


<h2>

<i class="fa-solid fa-pen"></i>

Modifier mes informations

</h2>




<label>

Nom complet

</label>


<input 
type="text"
id="editNom">





<label>

Téléphone

</label>


<input 
type="tel"
id="editTelephone">





<button id="btnSauver">

<i class="fa-solid fa-save"></i>

Enregistrer les modifications

</button>



</section>





<div id="message"></div>




</main>





<footer>


COMMUNAUTÉ NUMÉRIQUE MWANA MBOKA

<br>

Ensemble nous irons plus loin.


</footer>



</div>



<script type="module" src="profil.js"></script>


</body>

     </html>
